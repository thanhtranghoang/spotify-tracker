name: Spotify Tracker

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  track:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run tracker
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python tracker.py

      - name: Save updated data back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add spotify_data.json
          git diff --staged --quiet || git commit -m "Update play counts $(date -u)"

          # Retry push up to 3 times with 10s delay if GitHub returns 5xx
          for attempt in 1 2 3; do
            echo "Push attempt $attempt..."
            git push && echo "✅ Push successful" && break
            if [ $attempt -lt 3 ]; then
              echo "⚠️ Push failed, retrying in 10 seconds..."
              sleep 10
            else
              echo "❌ All push attempts failed — data was saved locally in this run"
              exit 0   # Exit 0 so the workflow doesn't show as failed
            fi
          done
